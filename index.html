<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blue CoLab's Sonification Stacked Graph</title>
    <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
    <style>
        body {
            background-color: black;
            background: url("https://images.unsplash.com/photo-1690046793092-f8d634523264?q=80&w=1000&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fHNoYXBlcyUyMGJhY2tncm91bmR8ZW58MHx8MHx8fDA%3D");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;

            width: 100%;
            height: 100%;
            margin: 0;
        }

        #playStart h1,
        #control {
            color: white;
        }

        #graph-container {
            margin: 30px 30px;
        }

        .main-svg {
            border-radius: 25px;
        }
    </style>
</head>

<body>
    <div id="graph-container">
        <div id="plot"></div>
    </div>

    <div>
        <audio id="Salinity" loop>
            <source src="static/data/set_2/audio/salinity.mp3" type="audio/mpeg">
        </audio>

        <audio id="pH" loop>
            <source src="static/data/set_2/audio/ph.mp3" type="audio/mpeg">
        </audio>

        <audio id="Temperature(F)" loop>
            <source src="static/data/set_2/audio/temperature(f).mp3" type="audio/mpeg">
        </audio>

        <audio id="Turbidity" loop>
            <source src="static/data/set_2/audio/turbidity.mp3" type="audio/mpeg">
        </audio>

        <audio id="Dissolved Oxygen" loop>
            <source src="static/data/set_2/audio/dissolvedoxygen.mp3" type="audio/mpeg">
        </audio>

        <audio id="Conductivity" loop>
            <source src="static/data/set_2/audio/conductivity.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div id="playStart" style="display: flex; justify-content: center; align-items: center; padding: 20px">
        <h1 style="margin-right: 10px;">Press Play to Start Experience</h1>
        <div onclick="toggleAudio()" style="background-color: transparent; cursor: pointer;" id="control">
            <svg width="50px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                <path
                    d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80V432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z" />
            </svg>
        </div>
    </div>

    <script src="static/js/plotly-graph.js"></script>
</body>

</html>
