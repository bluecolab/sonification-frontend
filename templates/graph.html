<!DOCTYPE html>
<html lang="en">

<head>

    <title>BlueCoLab's Sonification Stacked Graph</title>

        <style>
        @font-face {
            font-family: Roboto;
            src: url(../static/fonts/Roboto/Roboto-Medium.ttf);
        }
        * {
            font-family: Roboto, Arial, Helvetica, sans-serif;
            font-weight: 400;
            /* border: 1px solid; */
        }
        header {
            display: flex;
            align-items: center;
        }
        header h2 {
            flex: 3;
            padding: 0 5% 0 5%;
        }
        header div {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex: .25;
        }

        .svg {
            width: 100%;
            height: 100%;
        }

        #playSvg, #pauseSvg {
            padding: 20%;
        }

        /* Add this style block to change the background color and adapt text colors */
        body {
             /* Set the background to black */
            /* background: url("https://images.unsplash.com/photo-1690046793092-f8d634523264?q=80&w=1000&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fHNoYXBlcyUyMGJhY2tncm91bmR8ZW58MHx8MHx8fDA%3D"); */
            background: url(../static/images/background2.jpg);
            color: white; /* Set the text color to white for contrast */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            margin: 2% 5% 2% 5%;
        }

        /* You may want to add other style rules to ensure that all text and elements are visible on a black background. */

        /* This is to ensure that the play button and the title have enough contrast against the black background */
        #playStart h1{
            color: white; /* Set the text color to white for contrast */
        }

        #control {
            width: 3em;
        }

        /* Style for the graph container if needed */
        #graph-container {
            margin-top: 2%;
            box-shadow: 0 0 30px rgb(0, 0, 0);
        }

        #track-form {
            overflow: auto;
            height: 10em;
            width: 45%;
        }

        #track-form::-webkit-scrollbar {
            display: none;
        }

        .input:hover {
            background-color: rgba(0, 0, 0, 0.281);
        }

        .input {
            border: none;
            text-align: left;
            background: none;
            color: white;
            width: 100%;
            height: 1.5em;
            border-top: 1px solid;
            font-size: 2em;
        }

        .formbtn {
            display: flex;
            align-items: center;
        }

        #playSvg {
            display: block;
        }

        #pauseSvg {
            display: none;
        }

    </style>
</head>

    <div>
        <h3>Click and play more awesome tracks here!</h3>
        <form id="track-form" method="post" action="/">
            {% for file in files %}
                <div class="formbtn">
                    <input class="input" type="submit" name="name" value="{{ file.name }}"></input>
                </div>
            {% endfor %}
        </form>
    </div>

    <script>
        // Gets reference to all of the audio components above
        let audioElements = document.getElementsByTagName('audio');

        // Wait for the DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function () {
            // Get a reference to the Plotly graph
            let plotlyGraph = document.getElementById('graph-container').querySelector('.plotly-graph-div');

            // Attach 'plotly_restyle' event listener, it's trigged when someone clicks on legend
            plotlyGraph.on('plotly_restyle', function (eventdata) {
                console.log(eventdata)
                var updatedVisibility = eventdata[0].visible; // contains what status to changed to
                let changedElements = eventdata[1]; // contains what elements change applied to

                if (Array.isArray(updatedVisibility)) { // if there's multiple visibilities according to eventdata
                    // Iterate through each trace
                    for (let i = 0; i < updatedVisibility.length; i++) {
                        if (updatedVisibility[i] === 'legendonly') {
                            audioElements[changedElements[i]].muted = true; // Mute the audio if the trace is hidden
                        } else if (updatedVisibility[i] == true ) {
                            audioElements[changedElements[i]].muted = false; // Unmute the audio if the trace is visible
                        }
                    }
                } else { // sometimes the updatedVisibility returns a string, not an array. In that case we want to set all the changed parameters to that status
                    for (let i = 0; i < changedElements.length; i++) {
                        audioElements[changedElements[i]].muted = updatedVisibility === 'legendonly' ? true : false;
                    }

                }
                //     console.log(`The value of ${visibilityIndex} (${parameterElements[visibilityIndex]}) was set to ${visibilityStatus == true ? "unmuted" : "muted"}.`)
                //     document.getElementById("messy").innerHTML = `${document.getElementById("messy").innerHTML} <li>The value of ${visibilityIndex} (${parameterElements[visibilityIndex]}) was set to ${visibilityStatus == true ? "unmuted" : "muted"}.</li>`
                //
            });
        });

        function startAudio() {
            document.getElementById("playStart").remove();
            for (let audio of audioElements) {
                audio.play();
            }
        }
        
        function toggleAudio() {
            for (let audio of audioElements) {
                if (audio.paused) {
                    document.getElementById("playSvg").style.display = "none";
                    document.getElementById("pauseSvg").style.display = "block";
                    audio.play();
                } else {
                    document.getElementById("playSvg").style.display = "block";
                    document.getElementById("pauseSvg").style.display = "none";
                    audio.pause();
                }


            }
        }

        // Function to select all parameters
        function selectAll() {
            var update = {
                visible: true
            };
            let plotlyGraph = document.getElementById('graph-container').querySelector('.plotly-graph-div');
            Plotly.restyle(plotlyGraph, update);
        }

        // Function to deselect all parameters
        function deselectAll() {
            var update = {
                visible: 'legendonly'
            };
            let plotlyGraph = document.getElementById('graph-container').querySelector('.plotly-graph-div');
            Plotly.restyle(plotlyGraph, update);
        }

        // Function to set visibility of multiple parameters simultaneously
        function setVisibility(parameters) {
            var update = { visible: [], };
            indexArr = []
            parameters.forEach(function (param) {
                update.visible.push(param.visibility);
                indexArr.push(param.index)
            });
            let plotlyGraph = document.getElementById('graph-container').querySelector('.plotly-graph-div');
            Plotly.restyle(plotlyGraph, update, indexArr);
        }
    </script>
