<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BlueCoLab's Sonification Stacked Graph</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
        <style>
        /* Add this style block to change the background color and adapt text colors */
        body {
            background-color: black; /* Set the background to black */
            background: url("https://images.unsplash.com/photo-1690046793092-f8d634523264?q=80&w=1000&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fHNoYXBlcyUyMGJhY2tncm91bmR8ZW58MHx8MHx8fDA%3D");
            color: white; /* Set the text color to white for contrast */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            transform: scale(1.2, 1.2);
        }

        /* You may want to add other style rules to ensure that all text and elements are visible on a black background. */

        /* This is to ensure that the play button and the title have enough contrast against the black background */
        #playStart h1, #control {
            color: white; /* Set the text color to white for contrast */
        }

        /* Style for the graph container if needed */
        #graph-container {
            padding-top: 160px;
            margin: 0px 150px;
            /*transform: scale(1.2, 1.2)
            /* Add styles here if needed */
        }

        .main-svg {
            border-radius: 25px;
        }
    </style>
</head>

<body>
    <!-- Embed the Plotly Graph -->
    <div id="graph-container">
        {{ plot|safe }}
    </div>

    <div>
        <!-- Embed the Audio Files -->
        <audio id="Salinity" autoplay loop>
            <source src="{{ url_for('static', filename='audio/salinity.mp3') }}" type="audio/mpeg">
        </audio>

        <audio id="pH" autoplay loop>
            <source src="{{ url_for('static', filename='audio/ph.mp3') }}" type="audio/mpeg">
        </audio>

        <audio id="Temperature(F)" autoplay loop>
            <source src="{{ url_for('static', filename='audio/temperature(f).mp3') }}" type="audio/mpeg">
        </audio>

        <audio id="Turbidity" autoplay loop>
            <source src="{{ url_for('static', filename='audio/turbidity.mp3') }}" type="audio/mpeg">
        </audio>

        <audio id="Dissolved Oxygen" autoplay loop>
            <source src="{{ url_for('static', filename='audio/dissolvedoxygen.mp3') }}" type="audio/mpeg">
        </audio>

        <audio id="Conductivity" autoplay loop>
            <source src="{{ url_for('static', filename='audio/conductivity.mp3') }}" type="audio/mpeg">
        </audio>
    </div>

    <!-- <div>
        <button onclick="selectAll()">Select All</button>
        <button onclick="deselectAll()">Deselect All</button>
        <button
            onclick="setVisibility([{ index: 0, visibility: 'legendonly' }, { index: 2, visibility: true }])">Set
            Visibility</button>
    </div> -->

        <div id="playStart" style="display: flex; justify-content: center; align-items: center; padding: 20px">
        <h1 style="margin-right: 10px;">Press Play to Start Experience</h1>
        <div onclick="toggleAudio()" style="background-color: transparent;" id="control"><svg width="50px"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 384 512"><!--!Font Awesome Free 6.5.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2024 Fonticons, Inc.-->
                <path
                    d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80V432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z" />
            </svg></div>
    </div>



    <script>
        // Gets reference to all of the audio components above
        let audioElements = document.getElementsByTagName('audio');

        // Wait for the DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function () {
            // Get a reference to the Plotly graph
            let plotlyGraph = document.getElementById('graph-container').querySelector('.plotly-graph-div');

            // Attach 'plotly_restyle' event listener, it's trigged when someone clicks on legend
            plotlyGraph.on('plotly_restyle', function (eventdata) {
                console.log(eventdata)
                var updatedVisibility = eventdata[0].visible; // contains what status to changed to
                let changedElements = eventdata[1]; // contains what elements change applied to

                if (Array.isArray(updatedVisibility)) { // if there's multiple visibilities according to eventdata
                    // Iterate through each trace
                    for (let i = 0; i < updatedVisibility.length; i++) {
                        if (updatedVisibility[i] === 'legendonly') {
                            audioElements[changedElements[i]].muted = true; // Mute the audio if the trace is hidden
                        } else if (updatedVisibility[i] == true ) {
                            audioElements[changedElements[i]].muted = false; // Unmute the audio if the trace is visible
                        }
                    }
                } else { // sometimes the updatedVisibility returns a string, not an array. In that case we want to set all the changed parameters to that status
                    for (let i = 0; i < changedElements.length; i++) {
                        audioElements[changedElements[i]].muted = updatedVisibility === 'legendonly' ? true : false;
                    }

                }
                //     console.log(`The value of ${visibilityIndex} (${parameterElements[visibilityIndex]}) was set to ${visibilityStatus == true ? "unmuted" : "muted"}.`)
                //     document.getElementById("messy").innerHTML = `${document.getElementById("messy").innerHTML} <li>The value of ${visibilityIndex} (${parameterElements[visibilityIndex]}) was set to ${visibilityStatus == true ? "unmuted" : "muted"}.</li>`
                //
            });
        });

        function startAudio() {
            document.getElementById("playStart").remove();
            for (let audio of audioElements) {
                audio.play();
            }
        }
        function toggleAudio() {
            for (let audio of audioElements) {
                let play = '<svg width="50px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512"><!--!Font Awesome Free 6.5.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2024 Fonticons, Inc.--><path d="M48 64C21.5 64 0 85.5 0 112V400c0 26.5 21.5 48 48 48H80c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48H48zm192 0c-26.5 0-48 21.5-48 48V400c0 26.5 21.5 48 48 48h32c26.5 0 48-21.5 48-48V112c0-26.5-21.5-48-48-48H240z"/></svg>'
                let pause = '<svg width="50px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><!--!Font Awesome Free 6.5.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2024 Fonticons, Inc.--><path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80V432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/></svg>'

                if (audio.paused) {
                    // FIX THIS SO WE DONT USE .INNERHTML!!!
                    document.getElementById("control").innerHTML = play;
                    audio.play();
                } else {
                    document.getElementById("control").innerHTML = pause;
                    audio.pause();
                }


            }
        }
        // Function to select all parameters
        function selectAll() {
            var update = {
                visible: true
            };
            let plotlyGraph = document.getElementById('graph-container').querySelector('.plotly-graph-div');
            Plotly.restyle(plotlyGraph, update);
        }

        // Function to deselect all parameters
        function deselectAll() {
            var update = {
                visible: 'legendonly'
            };
            let plotlyGraph = document.getElementById('graph-container').querySelector('.plotly-graph-div');
            Plotly.restyle(plotlyGraph, update);
        }

        // Function to set visibility of multiple parameters simultaneously
        function setVisibility(parameters) {
            var update = { visible: [], };
            indexArr = []
            parameters.forEach(function (param) {
                update.visible.push(param.visibility);
                indexArr.push(param.index)
            });
            let plotlyGraph = document.getElementById('graph-container').querySelector('.plotly-graph-div');
            Plotly.restyle(plotlyGraph, update, indexArr);
        }
    </script>

</body>

</html>
